name: Add missing sites
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  add-sites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create 1er-art
        run: |
          mkdir -p 1er-art
          echo '' | base64 -d | gunzip > 1er-art/index.html
          echo "Created 1er-art/index.html ($(wc -c < 1er-art/index.html) bytes)"

      - name: Create au-bistro
        run: |
          mkdir -p au-bistro
          echo '' | base64 -d | gunzip > au-bistro/index.html
          echo "Created au-bistro/index.html ($(wc -c < au-bistro/index.html) bytes)"

      - name: Create au-vieux-paris
        run: |
          mkdir -p au-vieux-paris
          echo '' | base64 -d | gunzip > au-vieux-paris/index.html
          echo "Created au-vieux-paris/index.html ($(wc -c < au-vieux-paris/index.html) bytes)"

      - name: Create cafe-carrousel
        run: |
          mkdir -p cafe-carrousel
          echo '' | base64 -d | gunzip > cafe-carrousel/index.html
          echo "Created cafe-carrousel/index.html ($(wc -c < cafe-carrousel/index.html) bytes)"
      - name: Commit and push
        run: |
          git config user.name "Grilou974"
          git config user.email "agelougilles@gmail.com"
          git add .
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Add 4 missing site folders (1er-art, au-bistro, au-vieux-paris, cafe-carrousel)"
          git push
